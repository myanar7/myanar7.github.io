<!DOCTYPE html>
<html lang="tr" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Liderlik Tablosu | Boulder League</title>
  <meta name="description"
    content="Boulder League Tırmanış Salonu Ligi — Güncel erkekler ve kadınlar liderlik tablosu." />

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              400: '#fb923c',
              500: '#f97316',
              600: '#ea580c',
            },
            surface: {
              900: '#0d0d0f',
              800: '#141418',
              700: '#1c1c22',
              600: '#242430',
              500: '#2e2e3a',
            }
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
          boxShadow: {
            'glow-sm': '0 0 10px rgba(249,115,22,0.2)',
          },
        }
      }
    }
  </script>

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>

<body class="bg-surface-900 text-gray-100 font-sans min-h-screen antialiased">

  <!-- ──────────────────── HEADER ──────────────────── -->
  <header class="border-b border-surface-600 bg-surface-900/90 backdrop-blur-md">
    <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <!-- Logo / Brand -->
        <div class="flex items-center gap-3">
          <div
            class="w-9 h-9 rounded-xl bg-gradient-to-br from-brand-500 to-brand-600 flex items-center justify-center shadow-glow-sm">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 3l7 7 7-7M5 12l7 7 7-7" />
            </svg>
          </div>
          <div>
            <h1 class="text-sm font-bold tracking-wide text-white">BOULDER LEAGUE</h1>
            <p class="text-xs text-gray-500 leading-none">Tırmanış Salonu Ligi</p>
          </div>
        </div>

        <!-- Last updated + refresh -->
        <div class="flex items-center gap-3">
          <span id="last-updated" class="hidden sm:block text-xs text-gray-600"></span>
          <button id="btn-refresh" class="flex items-center gap-2 px-3 py-1.5 rounded-xl bg-surface-700 hover:bg-surface-600
                   border border-surface-500 text-sm font-medium text-gray-400 hover:text-white
                   transition-all duration-200 group">
            <svg id="refresh-icon" class="w-4 h-4 group-hover:rotate-180 transition-transform duration-500" fill="none"
              stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
            </svg>
            Yenile
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- ──────────────────── PAGE TITLE ──────────────────── -->
  <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 pt-10 pb-6">
    <div class="flex items-end gap-4">
      <div>
        <p class="text-xs font-semibold uppercase tracking-widest text-brand-500 mb-1">Genel Sıralama</p>
        <h2 class="text-3xl sm:text-4xl font-extrabold text-white tracking-tight">Liderlik Tablosu</h2>
      </div>
      <div class="mb-1 flex items-center gap-2 px-3 py-1.5 rounded-full bg-brand-500/10 border border-brand-500/30">
        <span class="w-1.5 h-1.5 rounded-full bg-brand-400 animate-pulse"></span>
        <span class="text-xs font-semibold text-brand-400 tracking-wider">CANLI</span>
      </div>
    </div>
  </div>

  <!-- ──────────────────── TABLES ──────────────────── -->
  <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 pb-16">

    <!-- Error Banner -->
    <div id="error-banner"
      class="hidden mb-6 p-4 rounded-xl bg-red-500/10 border border-red-500/30 flex items-center gap-3">
      <svg class="w-5 h-5 text-red-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      <span id="error-message" class="text-sm text-red-300"></span>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

      <!-- ── Men's Table ── -->
      <div class="card-glass rounded-2xl overflow-hidden">
        <div class="px-6 py-4 border-b border-surface-600 flex items-center gap-3">
          <div class="w-8 h-8 rounded-lg bg-blue-500/20 flex items-center justify-center text-lg">🧗</div>
          <div>
            <h3 class="font-bold text-white">Erkekler</h3>
            <p id="men-count" class="text-xs text-gray-500">Yükleniyor...</p>
          </div>
        </div>
        <div class="overflow-x-auto">
          <!-- Loading -->
          <div id="men-loading" class="flex items-center justify-center py-16">
            <div class="spinner"></div>
          </div>
          <!-- Table -->
          <table id="men-table" class="w-full hidden">
            <thead>
              <tr class="text-xs font-semibold text-gray-500 uppercase tracking-wider border-b border-surface-600">
                <th class="px-6 py-3 text-left w-12">#</th>
                <th class="px-6 py-3 text-left">Sporcu</th>
                <th class="px-6 py-3 text-right">Puan</th>
              </tr>
            </thead>
            <tbody id="men-tbody" class="divide-y divide-surface-700"></tbody>
          </table>
          <!-- Empty -->
          <div id="men-empty" class="hidden text-center py-16 text-gray-600">
            <svg class="w-10 h-10 mx-auto mb-3 opacity-40" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" />
            </svg>
            <p class="text-sm">Henüz sporcu yok</p>
          </div>
        </div>
      </div>

      <!-- ── Women's Table ── -->
      <div class="card-glass rounded-2xl overflow-hidden">
        <div class="px-6 py-4 border-b border-surface-600 flex items-center gap-3">
          <div class="w-8 h-8 rounded-lg bg-pink-500/20 flex items-center justify-center text-lg">🧗‍♀️</div>
          <div>
            <h3 class="font-bold text-white">Kadınlar</h3>
            <p id="women-count" class="text-xs text-gray-500">Yükleniyor...</p>
          </div>
        </div>
        <div class="overflow-x-auto">
          <!-- Loading -->
          <div id="women-loading" class="flex items-center justify-center py-16">
            <div class="spinner"></div>
          </div>
          <!-- Table -->
          <table id="women-table" class="w-full hidden">
            <thead>
              <tr class="text-xs font-semibold text-gray-500 uppercase tracking-wider border-b border-surface-600">
                <th class="px-6 py-3 text-left w-12">#</th>
                <th class="px-6 py-3 text-left">Sporcu</th>
                <th class="px-6 py-3 text-right">Puan</th>
              </tr>
            </thead>
            <tbody id="women-tbody" class="divide-y divide-surface-700"></tbody>
          </table>
          <!-- Empty -->
          <div id="women-empty" class="hidden text-center py-16 text-gray-600">
            <svg class="w-10 h-10 mx-auto mb-3 opacity-40" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" />
            </svg>
            <p class="text-sm">Henüz sporcu yok</p>
          </div>
        </div>
      </div>

    </div>
  </main>

  <!-- ──────────────────── SCRIPT ──────────────────── -->
  <script>
    /* ══════════════════════════════════════════
       Standalone Leaderboard — Self-contained JS
    ══════════════════════════════════════════ */
    const API_BASE = 'https://boulder-championship-api.onrender.com/api/v2';

    // ── API ──
    async function apiFetch(path) {
      const res = await fetch(`${API_BASE}${path}`);
      if (!res.ok) {
        let msg = `HTTP ${res.status}`;
        try { const b = await res.json(); msg = b.message || b.error || msg; } catch (_) { }
        throw new Error(msg);
      }
      if (res.status === 204) return null;
      const json = await res.json();
      if (json !== null && typeof json === 'object' && 'data' in json) return json.data;
      return json;
    }

    // ── XSS escape ──
    function escHtml(str) {
      const d = document.createElement('div');
      d.appendChild(document.createTextNode(String(str)));
      return d.innerHTML;
    }

    // ── Render one leaderboard table ──
    function renderTable(climbers, tbodyId, tableId, emptyId, loadingId, countId) {
      document.getElementById(loadingId).classList.add('hidden');
      document.getElementById(countId).textContent = `${climbers?.length ?? 0} sporcu`;

      if (!climbers || climbers.length === 0) {
        document.getElementById(emptyId).classList.remove('hidden');
        return;
      }

      const tbody = document.getElementById(tbodyId);
      const table = document.getElementById(tableId);
      table.classList.remove('hidden');

      tbody.innerHTML = climbers.map((c, i) => {
        const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : null;
        const rankCell = medal
          ? `<td class="px-6 py-4 text-lg">${medal}</td>`
          : `<td class="px-6 py-4 text-gray-500 text-sm font-mono">${i + 1}</td>`;
        const score = (c.totalPoints ?? c.totalScore ?? c.total_score ?? 0).toFixed(2);
        const rowBg = i === 0 ? 'bg-amber-500/5' : '';
        const scoreColor = i === 0 ? 'text-amber-400' : 'text-brand-400';

        return `
          <tr class="leaderboard-row ${rowBg}">
            ${rankCell}
            <td class="px-6 py-4">
              <span class="font-semibold text-white">
                ${escHtml(c.firstName || c.first_name || '')} ${escHtml(c.lastName || c.last_name || '')}
              </span>
            </td>
            <td class="px-6 py-4 text-right">
              <span class="font-bold text-lg ${scoreColor}">${score}</span>
            </td>
          </tr>`;
      }).join('');
    }

    // ── Load leaderboard ──
    async function loadLeaderboard() {
      // Reset state
      ['men', 'women'].forEach(g => {
        document.getElementById(`${g}-loading`).classList.remove('hidden');
        document.getElementById(`${g}-table`).classList.add('hidden');
        document.getElementById(`${g}-empty`).classList.add('hidden');
        document.getElementById(`${g}-count`).textContent = 'Yükleniyor...';
      });
      document.getElementById('error-banner').classList.add('hidden');

      try {
        const data = await apiFetch('/leaderboard');
        renderTable(data.men, 'men-tbody', 'men-table', 'men-empty', 'men-loading', 'men-count');
        renderTable(data.women, 'women-tbody', 'women-table', 'women-empty', 'women-loading', 'women-count');

        // Update timestamp
        const ts = document.getElementById('last-updated');
        ts.textContent = `Son güncelleme: ${new Date().toLocaleTimeString('tr-TR')}`;
        ts.classList.remove('hidden');
      } catch (err) {
        console.error('[Leaderboard] Yüklenemedi:', err);
        ['men', 'women'].forEach(g => {
          document.getElementById(`${g}-loading`).classList.add('hidden');
          document.getElementById(`${g}-count`).textContent = 'Hata';
        });
        const banner = document.getElementById('error-banner');
        document.getElementById('error-message').textContent = `Liderlik tablosu yüklenemedi: ${err.message}`;
        banner.classList.remove('hidden');
      }
    }

    // ── Refresh button ──
    document.getElementById('btn-refresh').addEventListener('click', loadLeaderboard);

    // ── Auto-refresh every 60 seconds ──
    loadLeaderboard();
    setInterval(loadLeaderboard, 60_000);
  </script>

</body>

</html>
